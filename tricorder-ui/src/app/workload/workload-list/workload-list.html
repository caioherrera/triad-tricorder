<h1>Workloads</h1>

<mat-form-field class="standard-form-text-field-large">
    <mat-label>Search filter</mat-label>
    <input matInput class="standard-table-filter-input" (keyup)="applyFilter($event)">
</mat-form-field>

<div class="standard-form-buttons margin-right-5p">
    <button class="new-object-button" mat-button title="New workload" routerLink="/workload/new" routerLinkActive="active" ariaCurrentWhenActive="page">
        + New workload
    </button>
</div>

<div class="standard-table-div div-width-95p">
    <table mat-table [dataSource]="dataSource" matSort class="standard-table">
    
        <ng-container matColumnDef="id">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let workload" class="standard-table-cell">{{workload.id}}</td>
        </ng-container>
    
        <ng-container matColumnDef="workload_name">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let workload" class="standard-table-cell">{{workload.workload_name}}</td>
        </ng-container>
    
        <ng-container matColumnDef="application">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Project</th>
            <td mat-cell *matCellDef="let workload" class="standard-table-cell">
                <a routerLink="/application/{{workload.application.id}}/view">
                    {{workload.application.application_name}} (#{{workload.application.id}})
                </a>
            </td>
        </ng-container>

        <ng-container matColumnDef="workload_desc">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let workload" class="standard-table-cell">{{workload.workload_desc}}</td>
        </ng-container>

        <ng-container matColumnDef="input_value">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Input value</th>
            <td mat-cell *matCellDef="let workload" class="standard-table-cell">{{workload.input_value}}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let workload" class="standard-table-cell">
                <button mat-button class="standard-table-button" title="View workload" routerLink="/workload/{{workload.id}}/view" routerLinkActive="active" ariaCurrentWhenActive="page">
                    <mat-icon fontIcon="visibility" class="sidebar-menu-icon" ></mat-icon>
                </button>
                <button mat-button class="standard-table-button" title="Edit workload" routerLink="/workload/{{workload.id}}/edit" routerLinkActive="active" ariaCurrentWhenActive="page">
                    <mat-icon fontIcon="edit" class="sidebar-menu-icon" ></mat-icon>
                </button>
                <!--<button mat-button class="standard-table-button" title="Delete workload">
                    <mat-icon fontIcon="delete" class="sidebar-menu-icon" ></mat-icon>
                </button>-->
            </td>
        </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="columnLabels" class="standard-table-header"></tr>
        <tr mat-row *matRowDef="let row; columns: columnLabels;" class="standard-table-row"></tr>
    
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page" />
</div>
