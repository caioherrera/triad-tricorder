<h1>{{pageTitle}}</h1>

<div class="standard-form-div">
    <div class="standard-form-section">
        <h3>General Information</h3>
        <div>
            <mat-form-field class="standard-form-text-field-small">
                <mat-label>Workload Id (autogenerated)</mat-label>
                <input matInput disabled [value]="workload.id">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Workload Name</mat-label>
                <input matInput [disabled]="isReadOnly" [(ngModel)] ="workload.workload_name">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Project</mat-label>
                <input matInput type="text" placeholder="Select project" [formControl]="autocompleteControl" [matAutocomplete]="auto" [(ngModel)]="selectedApplication">
                <mat-autocomplete #auto="matAutocomplete">
                    @for (option of filteredOptions | async; track option) {
                      <mat-option [value]="option">{{option}}</mat-option>
                    }
                  </mat-autocomplete>
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Description</mat-label>
                <input matInput [disabled]="isReadOnly" [(ngModel)]="workload.workload_desc">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Input value</mat-label>
                <input matInput [disabled]="isReadOnly" [(ngModel)]="workload.input_value">
            </mat-form-field>
        </div>
    </div>
</div>
<div class="standard-form-buttons margin-right-10p">
    <button mat-button class="form-button form-save-button" [hidden]="isReadOnly" title="Save" (click)="saveWorkload()">
        Save
    </button>
    <button mat-button class="form-button form-cancel-button" title="Cancel" (click)="back()">
        Cancel
    </button>
</div>
