<h1>Session file upload</h1>

<div class="standard-form-div">
    <div class="standard-form-section">
        <h3>General Information</h3>
        <div>
            <mat-form-field class="standard-form-text-field-small">
                <mat-label>Session Id (autogenerated)</mat-label>
                <input matInput disabled [value]="session.id">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Workload</mat-label>
                <input matInput type="text" placeholder="Select workload" [formControl]="workloadAutocompleteControl" [matAutocomplete]="auto1" [(ngModel)]="selectedWorkload">
                <mat-autocomplete #auto1="matAutocomplete">
                    @for (option of workloadFilteredOptions | async; track option) {
                      <mat-option [value]="option">{{option}}</mat-option>
                    }
                  </mat-autocomplete>
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Select files...</mat-label>
                <input matInput disabled placeholder="File name" [value]="currFileNames">
            </mat-form-field>
            <button mat-button class="form-button form-other-button" title="Browse" (click)="fileInput.click()">Browse files</button>
            <input type="file" accept=".csv" multiple (change)="onFileSelected($event)" style="display: none;" #fileInput>
        </div>
    </div>
</div>
<div class="standard-form-buttons margin-right-10p">
    <button mat-button class="form-button form-save-button" title="Save" (click)="saveSession()">
        Save
    </button>
    <button mat-button class="form-button form-cancel-button" title="Cancel" (click)="back()">
        Cancel
    </button>
</div>
