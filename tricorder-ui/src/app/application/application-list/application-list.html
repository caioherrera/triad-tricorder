<h1>Projects</h1>

<mat-form-field class="standard-form-text-field-large">
    <mat-label>Search filter</mat-label>
    <input matInput class="standard-table-filter-input" (keyup)="applyFilter($event)">
</mat-form-field>

<div class="standard-form-buttons margin-right-5p">
    <button class="new-object-button" mat-button title="New project" routerLink="/project/new" routerLinkActive="active" ariaCurrentWhenActive="page">
        + New project
    </button>
</div>

<div class="standard-table-div div-width-95p">
    <table mat-table [dataSource]="dataSource" matSort class="standard-table">
    
        <ng-container matColumnDef="id">
            <th mat-header-cell mat-sort-header *matHeaderCellDef> # </th>
            <td mat-cell *matCellDef="let application" class="standard-table-cell">{{application.id}}</td>
        </ng-container>
    
        <ng-container matColumnDef="application_name">
            <th mat-header-cell mat-sort-header *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let application" class="standard-table-cell">{{application.application_name}}</td>
        </ng-container>
    
        <ng-container matColumnDef="command_line">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Command Line</th>
            <td mat-cell *matCellDef="let application" class="standard-table-cell">{{application.command_line}}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let application" class="standard-table-cell">
                <button mat-button class="standard-table-button" title="View project" routerLink="/project/{{application.id}}/view" routerLinkActive="active" ariaCurrentWhenActive="page">
                    <mat-icon fontIcon="visibility" class="sidebar-menu-icon" ></mat-icon>
                </button>
                <button mat-button class="standard-table-button" title="Edit project" routerLink="/project/{{application.id}}/edit" routerLinkActive="active" ariaCurrentWhenActive="page">
                    <mat-icon fontIcon="edit" class="sidebar-menu-icon" ></mat-icon>
                </button>
                <!--<button mat-button class="standard-table-button" title="Delete project">
                    <mat-icon fontIcon="delete" class="sidebar-menu-icon" ></mat-icon>
                </button>-->
            </td>
        </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="columnLabels" class="standard-table-header"></tr>
        <tr mat-row *matRowDef="let row; columns: columnLabels;" class="standard-table-row"></tr>
    
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page" />
</div>
