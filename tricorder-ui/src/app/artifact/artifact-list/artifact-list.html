<h1>Project versions</h1>

<mat-form-field class="standard-form-text-field-large">
    <mat-label>Search filter</mat-label>
    <input matInput class="standard-table-filter-input" (keyup)="applyFilter($event)">
</mat-form-field>

<div class="standard-form-buttons margin-right-5p">
    <button class="new-object-button" mat-button title="New version" routerLink="/version/new" routerLinkActive="active" ariaCurrentWhenActive="page">
        + New version
    </button>
</div>

<div class="standard-table-div div-width-95p">
    <table mat-table [dataSource]="dataSource" matSort class="standard-table">
    
        <ng-container matColumnDef="id">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let artifact" class="standard-table-cell">{{artifact.id}}</td>
        </ng-container>
    
        <ng-container matColumnDef="artifact_name">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let artifact" class="standard-table-cell">{{artifact.artifact_name}}</td>
        </ng-container>
    
        <ng-container matColumnDef="application">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Project</th>
            <td mat-cell *matCellDef="let artifact" class="standard-table-cell">
                <a routerLink="/application/{{artifact.application.id}}/view">
                    {{artifact.application.application_name}} (#{{artifact.application.id}})
                </a>
            </td>
        </ng-container>

        <ng-container matColumnDef="file_path">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>File Path</th>
            <td mat-cell *matCellDef="let artifact" class="standard-table-cell">{{artifact.file_path}}</td>
        </ng-container>

        <ng-container matColumnDef="is_reference">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>Reference</th>
            <td mat-cell *matCellDef="let artifact" class="standard-table-cell">
                <mat-checkbox class="artifact-reference-check" disabled checked="{{artifact.is_reference == 1}}" />
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let artifact" class="standard-table-cell">
                <button mat-button class="standard-table-button" title="View version" routerLink="/version/{{artifact.id}}/view" routerLinkActive="active" ariaCurrentWhenActive="page">
                    <mat-icon fontIcon="visibility" class="sidebar-menu-icon" ></mat-icon>
                </button>
                <button mat-button class="standard-table-button" title="Edit version" routerLink="/version/{{artifact.id}}/edit" routerLinkActive="active" ariaCurrentWhenActive="page">
                    <mat-icon fontIcon="edit" class="sidebar-menu-icon" ></mat-icon>
                </button>
                <!--<button mat-button class="standard-table-button" title="Delete artifact">
                    <mat-icon fontIcon="delete" class="sidebar-menu-icon" ></mat-icon>
                </button>-->
            </td>
        </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="columnLabels" class="standard-table-header"></tr>
        <tr mat-row *matRowDef="let row; columns: columnLabels;" class="standard-table-row"></tr>
    
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page" />
</div>
