<h1>{{pageTitle}}</h1>

<div class="standard-form-div">
    <div class="standard-form-section">
        <h3>General Information</h3>
        <div>
            <mat-form-field class="standard-form-text-field-small">
                <mat-label>Version Id (autogenerated)</mat-label>
                <input matInput disabled [value]="artifact.id">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Version Name</mat-label>
                <input matInput [disabled]="isReadOnly" [(ngModel)] ="artifact.artifact_name">
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>Project</mat-label>
                <input matInput type="text" placeholder="Select project" [formControl]="autocompleteControl" [matAutocomplete]="auto" [(ngModel)]="selectedApplication">
                <mat-autocomplete #auto="matAutocomplete">
                    @for (option of filteredOptions | async; track option) {
                      <mat-option [value]="option">{{option}}</mat-option>
                    }
                  </mat-autocomplete>
            </mat-form-field>
        </div>
        <div>
            <mat-form-field class="standard-form-text-field-large">
                <mat-label>File Path</mat-label>
                <input matInput [disabled]="isReadOnly" [(ngModel)]="artifact.file_path">
            </mat-form-field>
        </div>
        <div>
            <mat-checkbox class="artifact-reference-check" [disabled]="isReadOnly" [(ngModel)]="artifact.is_reference">
                Set version as reference for project {{selectedApplication}}
            </mat-checkbox>
        </div>
    </div>
</div>
<div class="standard-form-buttons margin-right-10p">
    <button mat-button class="form-button form-save-button" [hidden]="isReadOnly" title="Save" (click)="saveArtifact()">
        Save
    </button>
    <button mat-button class="form-button form-cancel-button" title="Cancel" (click)="back()">
        Cancel
    </button>
</div>
